# Weekly GA Report trigger
#
# Required GitHub repo secrets:
#   REPORT_WEBHOOK_URL  — Full Vercel production URL ending in /api/report
#                         e.g. https://ga-analytics-reporter.vercel.app/api/report
#   WEBHOOK_SECRET      — Must match the WEBHOOK_SECRET env var set in Vercel

name: Weekly GA Report

on:
  schedule:
    - cron: '0 9 * * 2'   # Every Tuesday at 09:00 UTC
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write

jobs:
  trigger:
    name: Trigger Vercel report function
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: POST to report endpoint
        run: |
          curl --fail-with-body -sS \
            -X POST \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "content-type: application/json" \
            "${{ secrets.REPORT_WEBHOOK_URL }}" \
            -o report-response.json

      - name: Rewrite X follower snapshot
        run: node scripts/update-x-follower-snapshot.js report-response.json data/x-followers.jsonl

      - name: Commit X follower snapshot
        run: |
          if git diff --quiet -- data/x-followers.jsonl; then
            echo "No X follower snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-followers.jsonl
          git commit -m "Update X follower snapshot"
          git push
